<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;

        // Avoid double redirect
        if (!path.startsWith("/#")) {
          window.location.replace("/#" + path + search + hash);
        }
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
